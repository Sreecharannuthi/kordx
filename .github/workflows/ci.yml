# KordX CI — runs on every push to main and every PR.
# Validates: build, JVM unit tests, lint, detekt.
# Instrumentation tests (androidTest) require an emulator and are deferred

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: JVM unit tests
        run: ./gradlew :app:testDebugUnitTest :metaphony:testDebugUnitTest --no-daemon --stacktrace

      - name: Static analysis (lint + detekt)
        run: ./gradlew :app:lintDebug detekt --no-daemon --stacktrace

      # Coverage (koverXmlReport + Codecov) skipped — kover 0.8.3 bug #810
      # reports 0% for classes under com.android.* (our package).
      # Re-enable after upgrading to kover >= 0.9.x with the fix.
