# KordX CI — runs on every push to main and every PR.
# Validates: build (debug + release, all 4 modules), JVM unit tests,
# lint (debug + release), detekt.
# Instrumentation tests (androidTest) require an emulator and are
# deferred to a future workflow (see CONTRIBUTING.md "Reporting issues"
# for how to run them locally).
#
# i18n: the translated JSON assets under `app/src/main/assets/i18n/`
# are committed to this repository and are NOT regenerated on CI.
# The i18n build toolchain (Phrasey + the .phrasey/ config + npm
# scripts) lives in the dev test bed (`charan1601/remusic`) and is
# invoked by the maintainer before each public release. See
# CONTRIBUTING.md → "Internationalization" for the contribution flow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: only read repo contents. No write,
# no packages, no deployments. (Override per-step if a future job
# needs to push a release artifact.)
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Cache Gradle dependencies between runs. Saves 1-2 min per
          # build. The cache key is derived from the wrapper + the
          # version catalog, so a `libs.versions.toml` bump invalidates.
          cache-read-only: ${{ github.event_name == 'pull_request' && github.head_ref != 'main' }}

      - name: Ensure gradlew is executable
        # Workaround for `gradlew: Permission denied` on the CI runner
        # (the executable bit can be lost when the file is touched by
        # a Windows host or by git on a non-POSIX clone). Cheap and
        # idempotent; runs in <10ms.
        run: chmod +x ./gradlew

      - name: Build (debug, all 4 modules)
        run: ./gradlew :app:assembleDebug :core:assembleDebug :infra:assembleDebug :metaphony:assembleDebug --no-daemon --stacktrace

      - name: Build (release, app)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: JVM unit tests
        run: ./gradlew :app:testDebugUnitTest :metaphony:testDebugUnitTest --no-daemon --stacktrace

      - name: Static analysis (lint debug + release + detekt)
        run: ./gradlew :app:lintDebug :app:lintRelease detekt --no-daemon --stacktrace

      # Coverage (koverXmlReport + Codecov) is intentionally NOT run here.
      # kover 0.8.3's bundled IntelliJ agent hard-codes an exclude of
      # `com.android.*` (kotlinx-kover issue #810); KordX's production
      # code lives under `com.android.rockages.kordx.*` and is silently
      # filtered out, so the report would show 0% for every KordX
      # class — a misleading signal. Re-enable once we upgrade to a
      # kover version where the upstream fix is verified. The
      # `./gradlew koverHtmlReport` task still works locally; the
      # HTML report renders the class list correctly and just shows
      # 0% line coverage.
